<!DOCTYPE html>
<html>

<head>
    <title>Manajemen Data KTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/script.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Manajemen Data KTP</h2>

    <div id="message"></div>

    <div class="card shadow mb-4">

        <div class="card-body">

            <input type="hidden" id="id">

            <div class="mb-3">
                <label class="form-label">Nomor KTP</label>
                <input type="text" id="nomorKtp" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" id="namaLengkap" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Alamat</label>
                <input type="text" id="alamat" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Tanggal Lahir</label>
                <input type="date" id="tanggalLahir" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Jenis Kelamin</label>
                <select id="jenisKelamin" class="form-select">
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="d-grid gap-2">
                <button onclick="saveData()" class="btn btn-primary">Simpan</button>
                <button onclick="resetForm()" class="btn btn-secondary">Reset</button>
            </div>

        </div>
    </div>

    <h4 class="text-center mb-3">Daftar Data KTP</h4>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Nomor KTP</th>
                    <th>Nama</th>
                    <th>Alamat</th>
                    <th>Tanggal Lahir</th>
                    <th>Jenis Kelamin</th>
                    <th>Aksi</th>
                </tr>

                </thead>

                <tbody id="tableKtp"></tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
